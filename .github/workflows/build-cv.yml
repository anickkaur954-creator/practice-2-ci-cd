name: Build LaTeX CV

on:
  push:
    branches:
      - main
    paths:
      - 'йЩИжЇРжѓЕ.tex'

jobs:
  build-cv:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Compile LaTeX CV
        uses: xu-cheng/latex-action@v2
        with:
          root_file: йЩИжЇРжѓЕ.tex

      - name: Fix permissions after Docker compilation
        run: sudo chmod -R a+rw .

      - name: Push PDF to release branch
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          cp йЩИжЇРжѓЕ.pdf /tmp/cv.pdf
          git fetch origin release
          git checkout release
          cp /tmp/cv.pdf йЩИжЇРжѓЕ.pdf
          git add йЩИжЇРжѓЕ.pdf
          git diff --staged --quiet || git commit -m "Update CV PDF"
          git push origin release
